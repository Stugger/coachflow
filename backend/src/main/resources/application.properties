spring.application.name=coachflow

spring.datasource.url=jdbc:postgresql://localhost:5432/coachflow
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

coachflow.jwt.issuer=coachflow-api
coachflow.jwt.secret=${COACHFLOW_JWT_SECRET}
coachflow.jwt.access-token-ttl=PT8H

server.address=${COACHFLOW_SERVER_ADDRESS}
server.port=8080